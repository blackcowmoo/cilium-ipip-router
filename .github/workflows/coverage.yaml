name: test

on:
  pull_request:

jobs:
  coverage:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@v1
        with:
          toolchain: nightly

      - name: Install cargo-tarpaulin
        run: cargo install cargo-tarpaulin

      - name: Run tests and get coverage
        id: coverage
        run: |
          set -e
          echo "Running: cargo tarpaulin --verbose --out Lcov --output-dir coverage"
          cargo tarpaulin --verbose --out Lcov --output-dir coverage

          if [ -f coverage/lcov.info ]; then
            TOTAL_LINES=$(grep -i '^LF:' coverage/lcov.info | awk '{sum+=$2} END {print sum+0}')
            COVERED_LINES=$(grep -i '^LH:' coverage/lcov.info | awk '{sum+=$2} END {print sum+0}')
            
            if [ "$TOTAL_LINES" -gt 0 ]; then
              COVERAGE=$(awk "BEGIN {printf \"%.2f\", $COVERED_LINES * 100 / $TOTAL_LINES}")
            else
              COVERAGE="0.00"
            fi
            
            echo "coverage=$COVERAGE" >> $GITHUB_OUTPUT
            echo "Total lines: $TOTAL_LINES, Covered lines: $COVERED_LINES, Coverage: $COVERAGE%"
          else
            echo "No coverage report generated"
            echo "coverage=0.00" >> $GITHUB_OUTPUT
           fi

      - name: Print lcov coverage report
        if: always()
        run: |
          if [ -f coverage/lcov.info ]; then
            echo "=== LCOV Coverage Report ==="
            cat coverage/lcov.info
            echo "=== End of LCOV Report ==="
          else
            echo "No lcov report file found"
          fi

      - name: Get diff lines and calculate coverage
        id: diff_coverage
        run: |
          set -e
          
          if [ -f coverage/lcov.info ]; then
            DIFF_FILES=$(git diff --name-only HEAD~1 HEAD 2>/dev/null | grep '\.rs$' | tr '\n' ' ' || echo "")
            
            if [ -n "$DIFF_FILES" ]; then
               TOTAL_LINES=0
               COVERED_LINES=0
               
               for FILE in $DIFF_FILES; do
                 if [ -f "coverage/lcov.info" ]; then
                   FILE_TOTAL=$(awk -v file="$FILE" '$1 == "SF:" && $2 == file {found=1; next} found && $1 == "LF:" {sum+=$2} found && $1 == "LH:" {cov+=$2} found && $1 == "end_of_record" {print cov+0, sum+0; exit} !found {next}' coverage/lcov.info 2>/dev/null)
                   FILE_COVERED=$(echo "$FILE_TOTAL" | awk '{print $1}')
                   FILE_LINES=$(echo "$FILE_TOTAL" | awk '{print $2}')
                   
                   if [ -n "$FILE_LINES" ] && [ "$FILE_LINES" != "0" ]; then
                     TOTAL_LINES=$((TOTAL_LINES + FILE_LINES))
                     COVERED_LINES=$((COVERED_LINES + FILE_COVERED))
                   fi
                 fi
               done
               
               if [ "$TOTAL_LINES" -gt 0 ]; then
                 DIFF_COVERAGE=$(awk "BEGIN {printf \"%.2f\", $COVERED_LINES * 100 / $TOTAL_LINES}")
               else
                 DIFF_COVERAGE="0.00"
               fi
               
               echo "diff_coverage=$DIFF_COVERAGE" >> $GITHUB_OUTPUT
               echo "Diff files covered: $COVERED_LINES / $TOTAL_LINES = $DIFF_COVERAGE%"
             else
               echo "No Rust files in diff"
               echo "diff_coverage=0.00" >> $GITHUB_OUTPUT
             fi
           else
              echo "No coverage report generated"
              echo "diff_coverage=0.00" >> $GITHUB_OUTPUT
            fi

      - name: Get uncovered lines in diff
        id: uncovered_lines
        if: always()
        run: |
          set -e
          
          if [ -f coverage/lcov.info ]; then
            DIFF_FILES=$(git diff --name-only HEAD~1 HEAD 2>/dev/null | grep '\.rs$' | tr '\n' ' ' || echo "")
            
            if [ -n "$DIFF_FILES" ]; then
               UNCOVERED=""
               for FILE in $DIFF_FILES; do
                 if [ -f "$FILE" ]; then
                   FILE_STATS=$(awk -v file="$FILE" '$1 == "SF:" && $2 == file {found=1; next} found && $1 == "LF:" {total=$2} found && $1 == "LH:" {covered=$2} found && $1 == "end_of_record" {print covered+0, total+0; exit} !found {next}' coverage/lcov.info 2>/dev/null)
                   FILE_COVERED=$(echo "$FILE_STATS" | awk '{print $1}')
                   FILE_TOTAL=$(echo "$FILE_STATS" | awk '{print $2}')
                   
                   if [ -n "$FILE_TOTAL" ] && [ "$FILE_TOTAL" != "0" ]; then
                     UNCOVERED_NUM=$((FILE_TOTAL - FILE_COVERED))
                     
                     if [ "$UNCOVERED_NUM" -gt 0 ]; then
                       if [ -n "$UNCOVERED" ]; then
                         UNCOVERED="${UNCOVERED}\n"
                       fi
                       UNCOVERED="${UNCOVERED}${FILE}: ${UNCOVERED_NUM} uncovered lines"
                     fi
                   fi
                 fi
               done
               
               echo "uncovered=${UNCOVERED}" >> $GITHUB_OUTPUT
             else
               echo "uncovered=" >> $GITHUB_OUTPUT
             fi
           else
             echo "uncovered=" >> $GITHUB_OUTPUT
           fi

      - name: Comment coverage
        if: github.event_name == 'pull_request'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -ex
          
          COVERAGE=${{ steps.coverage.outputs.coverage }}
          DIFF_COVERAGE=${{ steps.diff_coverage.outputs.diff_coverage }}
          UNCOVERED=${{ steps.uncovered_lines.outputs.uncovered }}
          
          printf '## Coverage\n\n| Coverage |\n|----------|\n| %s%% |\n\n### Coverage for Diff Lines\n\n| Diff Coverage |\n|---------------|\n| %s%% |\n\n' "${COVERAGE}" "${DIFF_COVERAGE}" > /tmp/coverage_comment.md
          
          if [ -n "$UNCOVERED" ]; then
            printf '\n<details>\n<summary>Uncovered Lines Details</summary>\n\n\`\`\`\n%s\n\`\`\`\n</details>\n' "$UNCOVERED" >> /tmp/coverage_comment.md
          fi
          
          COMMENT_EXISTS=$(gh api repos/${{ github.repository }}/issues/${{ github.event.number }}/comments --jq '.[].body' | grep -c "## Coverage" || true)
          
          if [ "$COMMENT_EXISTS" -gt 0 ]; then
            COMMENT_ID=$(gh api repos/${{ github.repository }}/issues/${{ github.event.number }}/comments --jq '.[] | select(.body | startswith("## Coverage")) | .id' | head -n1)
            gh pr comment ${{ github.event.number }} --body-file /tmp/coverage_comment.md --edit-last
          else
            gh pr comment ${{ github.event.number }} --body-file /tmp/coverage_comment.md
          fi
