name: test

on:
  pull_request:

jobs:
  coverage:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@v1
        with:
          toolchain: nightly

      - name: Install cargo-tarpaulin
        run: cargo install cargo-tarpaulin

      - name: Run tests and get coverage
        id: coverage
        run: |
          set -e
          echo "Running: cargo tarpaulin --verbose --out Lcov --output-dir coverage"
          cargo tarpaulin --verbose --out Lcov --output-dir coverage

          if [ -f coverage/lcov.info ]; then
            TOTAL_LINES=$(grep -oP 'TN:\K[^[]+' coverage/lcov.info | head -1 | tr -d ' ')
            COVERED_LINES=$(grep -oP 'LF:\K[0-9]+' coverage/lcov.info | tail -1 || echo "0")
            
            if [ -n "$TOTAL_LINES" ] && [ "$TOTAL_LINES" != "0" ]; then
              COVERAGE=$(echo "scale=2; $COVERED_LINES * 100 / $TOTAL_LINES" | bc 2>/dev/null || echo "0")
            else
              COVERAGE="0"
            fi
            
            echo "coverage=$COVERAGE" >> $GITHUB_OUTPUT
            echo "Total lines: $TOTAL_LINES, Covered lines: $COVERED_LINES, Coverage: $COVERAGE%"
          else
            echo "No coverage report generated"
            echo "coverage=0" >> $GITHUB_OUTPUT
          fi

      - name: Comment coverage
        if: github.event_name == 'pull_request'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -e
          
          COVERAGE=${{ steps.coverage.outputs.coverage }}
          
          printf '## Coverage\n\n| Coverage |\n|----------|\n| %s%% |\n\n### Uncovered Lines in This PR\n\nRun `cargo tarpaulin --verbose` locally to see detailed coverage information.\n' "${COVERAGE}" > /tmp/coverage_comment.md
          
          COMMENT_EXISTS=$(gh api repos/${{ github.repository }}/issues/${{ github.event.number }}/comments --jq '.[].body' | grep -c "## Coverage" || true)
          
          if [ "$COMMENT_EXISTS" -gt 0 ]; then
            COMMENT_ID=$(gh api repos/${{ github.repository }}/issues/${{ github.event.number }}/comments --jq '.[] | select(.body | startswith("## Coverage")) | .id' | head -n1)
            gh pr comment ${{ github.event.number }} --body-file /tmp/coverage_comment.md --edit $COMMENT_ID
          else
            gh pr comment ${{ github.event.number }} --body-file /tmp/coverage_comment.md
          fi
