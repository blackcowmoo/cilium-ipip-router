name: test

on:
  pull_request:

jobs:
  coverage:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@v1
        with:
          toolchain: nightly

      - name: Install cargo-tarpaulin
        run: cargo install cargo-tarpaulin

      - name: Run tests and get coverage
        id: coverage
        run: |
          set -e
          echo "Running: cargo tarpaulin --verbose --out Lcov --output-dir coverage"
          cargo tarpaulin --verbose --out Lcov --output-dir coverage

          if [ -f coverage/lcov.info ]; then
            TOTAL_LINES=$(grep '^LF:' coverage/lcov.info | awk '{sum+=$2} END {print sum}' || echo "0")
            COVERED_LINES=$(grep '^LH:' coverage/lcov.info | awk '{sum+=$2} END {print sum}' || echo "0")
            
            if [ -n "$TOTAL_LINES" ] && [ "$TOTAL_LINES" != "0" ]; then
              COVERAGE=$(echo "scale=2; $COVERED_LINES * 100 / $TOTAL_LINES" | bc 2>/dev/null || echo "0")
            else
              COVERAGE="0"
            fi
            
            echo "coverage=$COVERAGE" >> $GITHUB_OUTPUT
            echo "Total lines: $TOTAL_LINES, Covered lines: $COVERED_LINES, Coverage: $COVERAGE%"
          else
            echo "No coverage report generated"
            echo "coverage=0" >> $GITHUB_OUTPUT
           fi

      - name: Print lcov coverage report
        if: always()
        run: |
          if [ -f coverage/lcov.info ]; then
            echo "=== LCOV Coverage Report ==="
            cat coverage/lcov.info
            echo "=== End of LCOV Report ==="
          else
            echo "No lcov report file found"
          fi

      - name: Get diff lines and calculate coverage
        id: diff_coverage
        run: |
          set -e
          
          if [ -f coverage/lcov.info ]; then
            DIFF_FILES=$(git diff --name-only HEAD~1 HEAD 2>/dev/null | grep '\.rs$' | tr '\n' ' ' || echo "")
            
            if [ -n "$DIFF_FILES" ]; then
              TOTAL_LINES=0
              COVERED_LINES=0
              
              for FILE in $DIFF_FILES; do
                if [ -f "coverage/lcov.info" ]; then
                  FILE_TOTAL=$(grep -A1 "FNH.*$FILE" coverage/lcov.info 2>/dev/null | grep '^LH:' | awk '{sum+=$2} END {print sum}' || echo "0")
                  FILE_LINES=$(grep -A1 "FNH.*$FILE" coverage/lcov.info 2>/dev/null | grep '^LF:' | awk '{sum+=$2} END {print sum}' || echo "0")
                  
                  TOTAL_LINES=$((TOTAL_LINES + FILE_LINES))
                  COVERED_LINES=$((COVERED_LINES + FILE_TOTAL))
                fi
              done
              
              if [ -n "$TOTAL_LINES" ] && [ "$TOTAL_LINES" != "0" ]; then
                DIFF_COVERAGE=$(echo "scale=2; $COVERED_LINES * 100 / $TOTAL_LINES" | bc 2>/dev/null || echo "0")
              else
                DIFF_COVERAGE="0"
              fi
              
              echo "diff_coverage=$DIFF_COVERAGE" >> $GITHUB_OUTPUT
              echo "Diff files covered: $COVERED_LINES / $TOTAL_LINES = $DIFF_COVERAGE%"
            else
              echo "No Rust files in diff"
              echo "diff_coverage=0" >> $GITHUB_OUTPUT
            fi
          else
            echo "No coverage report generated"
            echo "diff_coverage=0" >> $GITHUB_OUTPUT
          fi

      - name: Get uncovered lines in diff
        id: uncovered_lines
        if: always()
        run: |
          set -e
          
          if [ -f coverage/lcov.info ]; then
            DIFF_FILES=$(git diff --name-only HEAD~1 HEAD 2>/dev/null | grep '\.rs$' | tr '\n' ' ' || echo "")
            
            if [ -n "$DIFF_FILES" ]; then
              UNCOVERED=""
              for FILE in $DIFF_FILES; do
                if [ -f "$FILE" ]; then
                  FILE_LCOV=$(grep -A1 "FNH.*$FILE" coverage/lcov.info 2>/dev/null || echo "")
                  FILE_LH=$(echo "$FILE_LCOV" | grep '^LH:' | awk '{print $2}' || echo "0")
                  FILE_LF=$(echo "$FILE_LCOV" | grep '^LF:' | awk '{print $2}' || echo "0")
                  
                  if [ -n "$FILE_LF" ] && [ "$FILE_LF" != "0" ]; then
                    COVERED=$(echo "$FILE_LH" | tr -d '\n')
                    TOTAL=$(echo "$FILE_LF" | tr -d '\n')
                    UNCOVERED_NUM=$((TOTAL - COVERED))
                    
                    if [ "$UNCOVERED_NUM" -gt 0 ]; then
                      if [ -n "$UNCOVERED" ]; then
                        UNCOVERED="${UNCOVERED}\n"
                      fi
                      UNCOVERED="${UNCOVERED}${FILE}: ${UNCOVERED_NUM} uncovered lines"
                    fi
                  fi
                fi
              done
              
              echo "uncovered=${UNCOVERED}" >> $GITHUB_OUTPUT
            else
              echo "uncovered=" >> $GITHUB_OUTPUT
            fi
          else
            echo "uncovered=" >> $GITHUB_OUTPUT
          fi

      - name: Comment coverage
        if: github.event_name == 'pull_request'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -ex
          
          COVERAGE=${{ steps.coverage.outputs.coverage }}
          DIFF_COVERAGE=${{ steps.diff_coverage.outputs.diff_coverage }}
          UNCOVERED=${{ steps.uncovered_lines.outputs.uncovered }}
          
          printf '## Coverage\n\n| Coverage |\n|----------|\n| %s%% |\n\n### Coverage for Diff Lines\n\n| Diff Coverage |\n|---------------|\n| %s%% |\n\n### Uncovered Lines in This PR\n\nRun `cargo tarpaulin --verbose` locally to see detailed coverage information.\n' "${COVERAGE}" "${DIFF_COVERAGE}" > /tmp/coverage_comment.md
          
          if [ -n "$UNCOVERED" ]; then
            printf '\n<details>\n<summary>Uncovered Lines Details</summary>\n\n\`\`\`\n%s\n\`\`\`\n</details>\n' "$UNCOVERED" >> /tmp/coverage_comment.md
          fi
          
          COMMENT_EXISTS=$(gh api repos/${{ github.repository }}/issues/${{ github.event.number }}/comments --jq '.[].body' | grep -c "## Coverage" || true)
          
          if [ "$COMMENT_EXISTS" -gt 0 ]; then
            COMMENT_ID=$(gh api repos/${{ github.repository }}/issues/${{ github.event.number }}/comments --jq '.[] | select(.body | startswith("## Coverage")) | .id' | head -n1)
            gh pr comment ${{ github.event.number }} --body-file /tmp/coverage_comment.md --edit-last
          else
            gh pr comment ${{ github.event.number }} --body-file /tmp/coverage_comment.md
          fi
