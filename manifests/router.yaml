apiVersion: v1
kind: ServiceAccount
metadata:
  name: router
  namespace: kube-system
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: router
rules:
  - apiGroups: [""]
    resources: ["nodes"]
    verbs: ["get", "list", "watch"]
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: router
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: router
subjects:
  - kind: ServiceAccount
    name: router
    namespace: kube-system
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: router-config
  namespace: kube-system
data:
  log4rs.yaml: |
    refresh_rate: 30 seconds
    appenders:
      stdout:
        kind: console
        encoder:
          pattern: "{d} [{t}] {l} {m}\n"
    root:
      level: info
      appenders:
        - stdout
---
apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: router
  namespace: kube-system
spec:
  selector:
    matchLabels:
      app: router
  template:
    metadata:
      labels:
        app: router
    spec:
      serviceAccountName: router
      hostNetwork: true
      dnsPolicy: ClusterFirstWithHostNet
      containers:
        - name: router
          image: ghcr.io/blackcowmoo/cilium-ipip-router:latest
          imagePullPolicy: IfNotPresent
          securityContext:
            capabilities:
              add:
                - NET_ADMIN
            privileged: false
          volumeMounts:
            - name: config
              mountPath: /var/lib/router/resources
            - name: sys
              mountPath: /sys
              readOnly: true
            - name: lib-modules
              mountPath: /lib/modules
              readOnly: true
            - name: run
              mountPath: /run
              readOnly: true
          resources:
            requests:
              memory: "64Mi"
              cpu: "100m"
            limits:
              memory: "128Mi"
              cpu: "200m"
          livenessProbe:
            httpGet:
              path: /health
              port: 9090
            initialDelaySeconds: 10
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /health
              port: 9090
            initialDelaySeconds: 5
            periodSeconds: 5
      volumes:
        - name: config
          configMap:
            name: router-config
        - name: sys
          hostPath:
            path: /sys
        - name: lib-modules
          hostPath:
            path: /lib/modules
        - name: run
          hostPath:
            path: /run
